services:
  msf-target:
    build: .
    container_name: msf-lab
    ports:
      - "2121:21"      # vsftpd 2.3.4 (use 2121 to avoid macOS FTP conflict)
      - "6200:6200"    # vsftpd backdoor shell
      - "8888:80"      # Shellshock CGI
      - "3632:3632"    # distcc RCE
    restart: unless-stopped
