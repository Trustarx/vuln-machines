services:
  frontend:
    image: nginx:alpine
    container_name: graphql-lab-frontend
    ports:
      - "8094:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: graphql-lab-backend
    restart: unless-stopped
