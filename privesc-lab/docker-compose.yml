services:
  vuln-server:
    build: .
    container_name: privesc-lab
    ports:
      - "8080:8080"   # Vulnerable web app
      - "2222:22"     # SSH access
    cap_add:
      - SYS_PTRACE    # Allow debugging for realistic privesc
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped
