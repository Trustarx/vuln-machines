spring.application.name=MarketHub
server.port=8080

# ── H2 database (in-memory) ──────────────────────────────────
spring.datasource.url=jdbc:h2:mem:markethub;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=markethub-db-2024
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 console exposed (would be a separate finding in a real audit)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ── Spring Boot Actuator — all endpoints exposed (Path 1) ───
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.show-values=ALWAYS
management.endpoint.heapdump.enabled=true

# ── Internal config — readable via path traversal (Path 4) ──
markethub.jwt.secret=mh_jwt_hs256_pr0d_sup3rs3cr3t_k3y_2024_xyz
markethub.internal.api-key=ik-prod-7f3a2b1c-internal-svc
markethub.flag.path=/app/private/flag.txt
markethub.invoices.dir=/app/invoices
