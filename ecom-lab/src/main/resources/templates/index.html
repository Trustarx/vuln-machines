<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MarketHub — B2B Procurement</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark px-3" style="background:#0f3a5c;">
    <span class="navbar-brand">🛒 MarketHub</span>
    <span class="text-white-50 small">B2B procurement · v1.0.0</span>
</nav>

<div class="container py-4">
    <div class="row mb-3">
        <div class="col-md-8">
            <h4 class="mb-1">Welcome to MarketHub</h4>
            <p class="text-muted small">
                Internal procurement portal. API at
                <code>/api/products</code>, <code>/api/auth</code>,
                <code>/api/invoices</code>, <code>/api/admin</code>.
            </p>
        </div>
        <div class="col-md-4">
            <form action="/api/products/search" method="get">
                <div class="input-group">
                    <input class="form-control" name="q" placeholder="Search catalogue...">
                    <button class="btn btn-primary">Search</button>
                </div>
            </form>
        </div>
    </div>

    <h5>Catalogue</h5>
    <div class="row row-cols-1 row-cols-md-3 g-3">
        <div class="col" th:each="p : ${products}">
            <div class="card h-100">
                <div class="card-body">
                    <h6 class="card-title" th:text="${p.name}">Product</h6>
                    <p class="card-text small text-muted" th:text="${p.description}">Description</p>
                    <p class="mb-1"><span class="text-muted small">SKU:</span> <code th:text="${p.sku}"></code></p>
                    <p class="mb-1">Stock: <span th:text="${p.stock}"></span></p>
                    <p class="fw-bold">€<span th:text="${p.price}"></span></p>
                </div>
            </div>
        </div>
    </div>

    <hr class="my-4">
    <p class="small text-muted">
        Sample invoices: <code>/api/invoices/download?file=INV-1001.pdf</code>
    </p>
</div>
</body>
</html>
