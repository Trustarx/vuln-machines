ServerName      "AcmeCorp FTP Server"
ServerType      standalone
DefaultServer   on
Port            21
Umask           022

# VULN: Run as www-data so mod_copy can write to web root
User            www-data
Group           www-data

MaxInstances    10
TimeoutIdle     1200
TimeoutNoTransfer 600
TimeoutStalled  600

TransferLog     /var/log/proftpd/xferlog
SystemLog       /var/log/proftpd/proftpd.log

# Required modules
LoadModule      mod_copy.c

# VULN: mod_copy enabled globally — allows SITE CPFR / SITE CPTO
# any authenticated (or anonymous) session can copy files
# (no AllowCopyMethod restriction = all copy methods permitted)

<Global>
  AllowOverwrite  yes
</Global>

# Authenticated user access
<Directory />
  AllowOverwrite  yes
</Directory>

# VULN: Anonymous FTP with read access to /var/ftp/pub
<Anonymous /var/ftp/pub>
  User            ftp
  Group           nogroup
  UserAlias       anonymous ftp
  RequireValidShell off
  MaxClients      10

  <Directory *>
    <Limit WRITE DELETE>
      DenyAll
    </Limit>
    <Limit READ DIRS>
      AllowAll
    </Limit>
  </Directory>
</Anonymous>
