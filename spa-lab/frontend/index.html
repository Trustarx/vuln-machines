<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Portal — CorpHQ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <!-- App config loaded before bundle — finding #1 -->
  <script src="/js/config.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">🏢 Nexus Portal</span>
  <div id="nav-user" class="text-white small"></div>
</nav>

<div class="container py-4">
  <div id="app">
    <!-- SPA mount point -->
    <div id="view-login" class="card mx-auto mt-5" style="max-width:400px;">
      <div class="card-body">
        <h5 class="card-title mb-3">Sign in to Nexus</h5>
        <input id="inp-user" class="form-control mb-2" placeholder="Username">
        <input id="inp-pass" class="form-control mb-3" type="password" placeholder="Password">
        <button class="btn btn-primary w-100" onclick="App.login()">Login</button>
        <p id="login-err" class="text-danger small mt-2"></p>
      </div>
    </div>

    <div id="view-dashboard" class="d-none">
      <h4>Dashboard</h4>
      <div id="admin-section" class="d-none">
        <div class="alert alert-warning">
          Admin panel — <a href="#" onclick="App.loadAdminFlag()">View internal flag</a>
        </div>
      </div>
      <div id="dashboard-content"></div>
      <button class="btn btn-sm btn-outline-secondary mt-3" onclick="App.logout()">Logout</button>
    </div>
  </div>
</div>

<!-- Main app bundle + source map reference — finding #2 -->
<script src="/js/app.js"></script>
</body>
</html>
